version: "3.9"

services:

  db:
    image: postgres:16
    container_name: medical_db

    environment:
      POSTGRES_DB: medical_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 10

  backend:

    build:
      context: ./backend
    container_name: medical_backend
    command: sh -c "python manage.py migrate && python manage.py seed && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
    - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  frontend:
  
    build:
      context: ./frontend
    container_name: medical_frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    stdin_open: true 
    tty: true        
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules: